services:
  claude-dev:
    container_name: ${COMPOSE_PROJECT_NAME:-claude-dev}
    build:
      context: .
      args:
        CODE_PATH: ${CODE_PATH}
        USERNAME: ${USER}
        USER_HOME: ${HOME}
        SSH_AUTHORIZED_KEYS: ${SSH_AUTHORIZED_KEYS}
        EXTRA_PACKAGES: ${EXTRA_PACKAGES:-}
    ports:
      - "${SSH_PORT:-2222}:22"
      - "${MOSH_PORT:-60001}:60001/udp"
    volumes:
      - ${CODE_PATH}:${CODE_PATH}
      - ${HOME}/.claude:${HOME}/.claude
      - ./.mount-stage:${HOME}/.claude-mount-stage
      - ssh-host-keys:/etc/ssh
      - ${HOME}/.ssh/known_hosts:${HOME}/.ssh/known_hosts:ro
      - build-cache:${HOME}/.cache

    environment:
      - APP_USER=${USER}
      - TZ=${TZ:-UTC}
      - GOMODCACHE=${HOME}/.cache/go-mod
      - CARGO_HOME=${HOME}/.cache/cargo
      - SVM_HOME=${HOME}/.cache/svm

    user: root
    entrypoint: /usr/local/bin/entrypoint.sh

    restart: always

volumes:
  ssh-host-keys:
  build-cache:
