services:
  claude-dev:
    container_name: claude-dev
    build:
      context: .
      args:
        CODE_PATH: ${CODE_PATH}
        USERNAME: ${USER}
        USER_HOME: ${HOME}
    user: '${USER}'
    ports:
      - "2222:22"       # SSH into the container on port 2222
    volumes:
      - ${CODE_PATH}:${CODE_PATH}
      - ./data/home:${HOME}/
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
      - ./data/ssh:/etc/ssh                      # persist SSH host keys across rebuilds

    command: >
      sh -c "
        if [ ! -f /etc/ssh/sshd_config ]; then
          sudo cp -r /etc/ssh.original/. /etc/ssh/
          sudo ssh-keygen -A
        fi
        sudo /usr/sbin/sshd -D
      "
    restart: always
